<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Dott.ssa Lorena Ghiotto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Palette e variabili come Home */
    :root {
      --color-primary: #3A6B53;
      --color-secondary: #5C6F66;
      --color-bg: #F9FAF9;
      --color-surface: #EBF2ED;
      --color-cta: #3A6B53;
      --color-cta-hover: #2f5a44;
    }
    body { font-family: 'Work Sans', sans-serif; background: var(--color-bg); color: #333; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .text-primary { color: var(--color-primary); }
    .bg-primary { background-color: var(--color-primary); }

    .blog-card { position: relative; overflow: hidden; background: white; transition: transform .3s ease; }
    .blog-card:hover { transform: translateY(-5px); }

    /* Watermark background */
    .page-watermark {
      position: fixed;
      inset: 0;
      background: url('img/BgBlog.jpg') center/cover no-repeat;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    main, header, footer { position: relative; z-index: 1; }
  </style>
</head>
<body class="min-h-screen">
  <div class="page-watermark"></div>
  <header class="bg-primary text-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html#Blog" class="flex items-center gap-2 text-white hover:text-white/80 font-semibold transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Torna alla Home
      </a>
      <span class="font-serif text-xl">Blog</span>
      <a href="index.html#contatti" class="text-white/80 hover:text-white text-sm font-medium transition">Contatti</a>
    </div>
  </header>

  <main class="py-16">
    <div class="container mx-auto px-6">
      <h1 class="text-4xl font-bold text-primary text-center mb-10">Tutti gli Articoli</h1>
      <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto" id="blog-list"></div>
      <article id="blog-article" class="max-w-4xl mx-auto mt-12 hidden bg-white/90 border rounded-2xl p-8 shadow">
        <button onclick="closeArticle()" class="float-right text-primary font-semibold">Chiudi ×</button>
        <div id="blog-article-content" class="clear-both"></div>
      </article>
    </div>
  </main>

  <footer class="bg-primary/80 text-white py-10 text-center backdrop-blur-sm">
    <p class="font-serif">Dott.ssa Lorena Ghiotto</p>
  </footer>

  <script src="js/data.js"></script>
  <script>
    const container = document.getElementById('blog-list');
    const articleEl = document.getElementById('blog-article');
    const articleContent = document.getElementById('blog-article-content');

    function openArticle(id) {
      const art = blogArticles.find(a => a.id === id);
      if (!art) return;
      
      // Costruisci galleria immagini se presenti
      let imagesHtml = '';
      if (art.images && art.images.length > 0) {
        imagesHtml = `<div class="grid grid-cols-2 md:grid-cols-3 gap-4 my-6">
          ${art.images.map(img => `<img src="${img}" alt="${art.title}" class="rounded-lg w-full h-40 object-cover">`).join('')}
        </div>`;
      }
      
      articleContent.innerHTML = `
        <span class="text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block">${art.tag}</span>
        <h2 class="text-3xl font-serif font-bold text-primary mb-6">${art.title}</h2>
        ${art.bgImage ? `<img src="${art.bgImage}" alt="${art.title}" class="w-full h-64 object-cover rounded-xl mb-6">` : ''}
        <div class="text-secondary text-lg leading-relaxed space-y-4 font-light">${art.fullText || art.excerpt}</div>
        ${imagesHtml}
      `;
      articleEl.classList.remove('hidden');
      window.scrollTo({ top: articleEl.offsetTop - 80, behavior: 'smooth' });
    }

    function closeArticle() {
      articleEl.classList.add('hidden');
      articleContent.innerHTML = '';
    }

    blogArticles.forEach(art => {
      const card = document.createElement('div');
      card.className = 'blog-card rounded-xl shadow-sm border border-gray-100 flex flex-col h-full overflow-hidden';
      card.innerHTML = `
        ${art.bgImage ? `<img src="${art.bgImage}" alt="${art.title}" class="w-full h-48 object-cover">` : ''}
        <div class="p-8 flex flex-col flex-grow">
          <span class="text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block">${art.tag}</span>
          <h3 class="text-2xl font-bold text-primary mb-4 font-serif">${art.title}</h3>
          <p class="text-secondary mb-6 text-sm flex-grow">${art.excerpt}</p>
          <button class="font-bold text-primary hover:text-accent-cta transition text-left mt-auto" onclick="openArticle(${art.id})">Apri articolo &rarr;</button>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
