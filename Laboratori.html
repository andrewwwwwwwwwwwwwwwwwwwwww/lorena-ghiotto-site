<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratori | Dott.ssa Lorena Ghiotto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Palette e variabili come Home */
    :root {
      --color-primary: #3A6B53;
      --color-secondary: #5C6F66;
      --color-bg: #F9FAF9;
      --color-surface: #EBF2ED;
      --color-cta: #3A6B53;
      --color-cta-hover: #2f5a44;
    }
    body { font-family: 'Work Sans', sans-serif; background: var(--color-bg); color: #333; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .text-primary { color: var(--color-primary); }
    .bg-primary { background-color: var(--color-primary); }

    /* Cards styling */
    .blog-card { position: relative; overflow: hidden; background: white; transition: transform .3s ease; }
    .blog-card:hover { transform: translateY(-5px); }
    .card-thumb { position:absolute; bottom:-30px; right:-30px; width:120px; height:120px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,0.92); box-shadow:0 10px 30px rgba(0,0,0,0.12); border:2px solid rgba(255,255,255,0.85); }
    .card-thumb img { width:100%; height:100%; object-fit:cover; }

    /* Watermark background */
    .page-watermark {
      position: fixed;
      inset: 0;
      background: url('img/BgLab.jpg') center/cover no-repeat;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    main, header, footer { position: relative; z-index: 1; }
  </style>
</head>
<body class="min-h-screen">
  <div class="page-watermark"></div>
  <header class="bg-primary text-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html#laboratori" class="flex items-center gap-2 text-white hover:text-white/80 font-semibold transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Torna alla Home
      </a>
      <span class="font-serif text-xl">Laboratori</span>
      <a href="index.html#contatti" class="text-white/80 hover:text-white text-sm font-medium transition">Contatti</a>
    </div>
  </header>

  <main class="py-16">
    <div class="container mx-auto px-6">
      <h1 class="text-4xl font-bold text-primary text-center mb-10">Tutti i Laboratori</h1>
      <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto" id="laboratori-list"></div>
      <div class="flex justify-center items-center gap-4 mt-8">
        <button id="prev-btn" class="px-6 py-2 bg-primary text-white rounded-full font-semibold hover:bg-primary/80 transition disabled:opacity-30 disabled:cursor-not-allowed" onclick="changePage(-1)">← Precedenti</button>
        <span id="page-indicator" class="text-primary font-semibold"></span>
        <button id="next-btn" class="px-6 py-2 bg-primary text-white rounded-full font-semibold hover:bg-primary/80 transition disabled:opacity-30 disabled:cursor-not-allowed" onclick="changePage(1)">Successivi →</button>
      </div>
      <article id="lab-article" class="max-w-4xl mx-auto mt-12 hidden bg-white/90 border rounded-2xl p-8 shadow">
        <button onclick="closeLabArticle()" class="float-right text-primary font-semibold">Chiudi ×</button>
        <div id="lab-article-content" class="clear-both"></div>
      </article>
    </div>
  </main>

  <footer class="bg-primary/80 text-white py-10 text-center backdrop-blur-sm">
    <p class="font-serif">Dott.ssa Lorena Ghiotto</p>
  </footer>

  <!-- Importa dati da data.js -->
  <script src="js/data.js"></script>
  <script>
    const container = document.getElementById('laboratori-list');
    const articleEl = document.getElementById('lab-article');
    const articleContent = document.getElementById('lab-article-content');

    function openLabArticle(id) {
      const art = articles.find(a => a.id === id);
      if (!art) return;
      const gallery = (art.images || []).map((src, i) => `<figure class='inline-block mr-2 mb-2'><img src='${encodeURI(src)}' alt='immagine ${i+1}' class='w-40 h-28 object-cover rounded-md'></figure>`).join('');
      articleContent.innerHTML = `
        <span class="text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block">${art.tag}</span>
        <h2 class="text-3xl font-serif font-bold text-primary mb-6">${art.title}</h2>
        <div class="text-secondary text-lg leading-relaxed space-y-4 font-light">${art.fullText || art.excerpt}</div>
        ${gallery ? `<div class='mt-6'>${gallery}</div>` : ''}
      `;
      articleEl.classList.remove('hidden');
      window.scrollTo({ top: articleEl.offsetTop - 80, behavior: 'smooth' });
    }

    function closeLabArticle() {
      articleEl.classList.add('hidden');
      articleContent.innerHTML = '';
    }

    let currentPage = 0;
    const itemsPerPage = 4;
    const totalPages = Math.ceil(articles.length / itemsPerPage);

    function renderPage() {
      container.innerHTML = '';
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const pageArticles = articles.slice(start, end);

      pageArticles.forEach(art => {
        const card = document.createElement('div');
        card.className = 'blog-card p-8 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full';
        card.innerHTML = `
          <span class="text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block">${art.tag}</span>
          <h3 class="text-2xl font-bold text-primary mb-4 font-serif">${art.title}</h3>
          <p class="text-secondary mb-6 text-sm flex-grow">${art.excerpt}</p>
          <button class="font-bold text-primary hover:text-accent-cta transition text-left mt-auto" onclick="openLabArticle(${art.id})">Apri laboratorio &rarr;</button>
        `;
        if (art.bgImage) {
          const thumb = document.createElement('div');
          thumb.className = 'card-thumb';
          const img = document.createElement('img');
          img.src = encodeURI(art.bgImage);
          img.alt = art.title;
          thumb.appendChild(img);
          card.appendChild(thumb);
        }
        container.appendChild(card);
      });

      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
      document.getElementById('page-indicator').textContent = `${currentPage + 1} / ${totalPages}`;
    }

    function changePage(direction) {
      currentPage += direction;
      if (currentPage < 0) currentPage = 0;
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderPage();
  </script>
</body>
</html>
