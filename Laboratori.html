  <style>
    /* Palette e variabili come Home */
    :root {
      --color-primary: #3A6B53;
      --color-secondary: #5C6F66;
      --color-bg: #F9FAF9;
      --color-surface: #EBF2ED;
      --color-cta: #3A6B53;

    body { font-family: 'Work Sans', sans-serif; background: var(--color-bg); color: #333; }

    .blog-card:hover { transform: translateY(-5px); }
    .card-thumb { position:absolute; bottom:-30px; right:-30px; width:120px; height:120px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,0.92); box-shadow:0 10px 30px rgba(0,0,0,0.12); border:2px solid rgba(255,255,255,0.85); }
    .card-thumb img { width:100%; height:100%; object-fit:cover; }

    /* Watermark background */
    .page-watermark {
      position: fixed;
      inset: 0;
      background: url('img/BgLab.jpg') center/cover no-repeat;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    main, header, footer { position: relative; z-index: 1; }

  <script>
    const articles = [
      { title: "La Donna e il suo Corpo", excerpt: "Empowerment femminile e mindful eating.", tag: "Crescita Personale", colorClass: "text-accent-spring", bgImage: "img/La donna e il suo corpo.jpeg", images: ["img/LaDonna01.jpeg", "img/LaDonna02.jpeg", "img/LaDonna03.jpeg"], id: 1 },
      { title: "Mindfulness tra Natura e Sapori", excerpt: "Mindful walking e mindful eating a Vetriolo.", tag: "Natura & Benessere", colorClass: "text-accent-summer", bgImage: "img/Mindfulness tra Natura e Sapori.jpeg", images: ["img/Mindfulness01.jpeg", "img/Mindfulness02.jpeg", "img/Mindfulness03.jpeg"], id: 2 },
      { title: "ZenFlow: Equilibrio Online", excerpt: "10 incontri online con pratiche di rilassamento.", tag: "Benessere Online", colorClass: "text-accent-winter", bgImage: "img/Zenflow01.jpeg", images: ["img/Zenflow01.jpeg", "img/CorsiMindfulness01.jpeg", "img/CorsiMindfulnessGruppo.jpeg", "img/CorsiMindfulnessIndividuale.jpeg"], id: 3 },
      { title: "Super poteri del cuore", excerpt: "Progetto sulle emozioni alla scuola primaria.", tag: "Scuola & Genitori", colorClass: "text-accent-autumn", bgImage: "img/Superpoteridelcuore.jpeg", images: ["img/Emozioniascuolta.jpg", "img/Superpoteridelcuore.jpeg", "img/LabScuola01.jpeg"], id: 4 },
      { title: "Benessere per le atlete", excerpt: "Gestione dell'ansia pre e post gara.", tag: "Sport & Mindfulness", colorClass: "text-accent-spring", bgImage: "img/MindfulBreathing01.jpeg", images: ["img/MindfulBreathing01.jpeg", "img/MindfulBreathing02.jpeg"], id: 5 },
      { title: "Emozioni in gioco", excerpt: "Laboratorio per genitori e figli.", tag: "Scuola & Genitori", colorClass: "text-accent-autumn", bgImage: "img/LabScuola01.jpeg", images: ["img/LabScuola01.jpeg"], id: 6 },
      { title: "Rituali di gusto", excerpt: "Degustazione consapevole al caseificio.", tag: "Natura & Benessere", colorClass: "text-accent-summer", bgImage: "img/Ritualidigusto.jpeg", images: ["img/Ritualidigusto.jpeg", "img/Ritualidigusto02.jpg"], id: 7 },
      { title: "Spazio Ben-essere", excerpt: "Incontri gratuiti di benessere personale.", tag: "Benessere Online", colorClass: "text-accent-winter", bgImage: "img/LaboratorioBenessere01.jpeg", images: ["img/LaboratorioBenessere01.jpeg", "img/LaboratorioBenessere02.jpeg", "img/LaboratorioBenessere03.jpeg", "img/LaboratorioBenessere04.jpeg", "img/LaboratorioBenessere05.jpeg"], id: 8 },
      { title: "Progetto D.I.T.A.", excerpt: "Danza, Integrazione, Terapia e Ascolto: corpo e mente attraverso il movimento.", tag: "Crescita Personale", colorClass: "text-accent-spring", bgImage: "img/GruppiStudio01.jpeg", images: ["img/GruppiStudio01.jpeg", "img/MindfulnessNif.jpeg"], id: 9 },
      { title: "Calm Connection", excerpt: "Mindfulness e connessione per ritrovare calma interiore.", tag: "Mindfulness & Relazioni", colorClass: "text-accent-summer", bgImage: "img/Calmconnection01.jpeg", images: ["img/Calmconnection01.jpeg", "img/CalmConnection02.jpeg", "img/CalmConnection03.jpeg", "img/CalmConnection04.jpeg", "img/CalmConnection05.jpeg", "img/CalmConnection06.jpeg"], id: 10 }
    ];

    const container = document.getElementById('laboratori-list');
    const articleEl = document.getElementById('lab-article');
    const articleContent = document.getElementById('lab-article-content');

    const fullTexts = {
      1: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>La donna e il suo corpo: un progetto dedicato all'empowerment femminile</h3><p class='mb-4'>Il progetto La donna e il suo corpo nasce dall'esigenza di creare uno spazio sicuro, accogliente e profondamente rispettoso in cui le donne potessero esplorare il proprio rapporto con il corpo, la propria storia emotiva e le modalità con cui, nel tempo, si sono relazionate al cibo, all'immagine di sé e al proprio benessere complessivo. L'incontro si è svolto in un teatro a Roma, un luogo scelto volutamente per la sua capacità di contenere, simbolicamente e fisicamente, ciò che emerge quando si lavora sull'identità corporea: il palco come spazio di espressione, la platea come spazio di ascolto, il teatro intero come contenitore di trasformazioni.</p><p class='mb-4'>Il progetto è stato realizzato in collaborazione con due colleghe: una psicoterapeuta e una dietista. La loro presenza ha arricchito il percorso portando sguardi complementari e competenze specifiche, fondamentali per affrontare il tema dell'empowerment femminile in modo completo e multidisciplinare. La psicoterapeuta ha lavorato sulle dimensioni emotive, sulle memorie corporee e sui vissuti legati all'immagine di sé, offrendo alle partecipanti strumenti per riconoscere le narrazioni interiori che spesso condizionano l'esperienza del corpo. La dietista, invece, ha portato un contributo prezioso legato alla fisiologia, all'alimentazione consapevole e alla possibilità di costruire un rapporto con il cibo più gentile, meno giudicante e calibrato sui bisogni reali.</p><p class='mb-4'>All'interno di questo quadro, il mio intervento si è concentrato sul mindful eating, un approccio che invita a recuperare presenza, sensorialità e connessione nel gesto quotidiano del nutrirsi. L'obiettivo non era insegnare \"come mangiare\", ma accompagnare le partecipanti nell'esplorare cosa accade nel corpo e nella mente quando ci si avvicina al cibo: quali emozioni emergono, quali automatismi prendono il sopravvento, quali sensazioni vengono ignorate o amplificate. Il mindful eating, in questo contesto, è diventato uno strumento per riscoprire la propria autenticità, entrando in relazione con se stesse senza giudizio e senza fretta.</p><p class='mb-4'>Durante il laboratorio abbiamo lavorato sull'ascolto del corpo, sull'osservazione dei segnali di fame e sazietà, sulla qualità del respiro e sul contatto con le sensazioni fisiche. Attraverso esercizi guidati, brevi meditazioni e momenti di condivisione, le partecipanti hanno potuto sperimentare come la consapevolezza possa trasformare l'esperienza del cibo e, più in generale, il modo in cui ci si abita dentro. Il cibo, infatti, è spesso uno dei linguaggi attraverso cui il corpo parla: comprenderlo, ascoltarlo e riconoscerlo significa restituire dignità alle proprie emozioni e ai propri bisogni.</p><p class='mb-4'>Il lavoro con le mie colleghe ha creato una sinergia particolarmente efficace. La Dott.ssa Iris Mattera, psicoterapeuta, ha offerto chiavi di lettura interiori grazie alla messa in scena dello Psicodramma. Veronica Giachè, dietista, ha dato indicazioni pratiche e scientifiche, e la mindful eating ha rappresentato il ponte tra queste due dimensioni, traducendo teoria e consapevolezza in esperienza. Questo approccio ha permesso alle partecipanti di sentirsi accolte nella complessità della loro storia personale, senza semplificazioni né giudizi, e di scoprire che l'empowerment femminile passa anche attraverso un nuovo modo di percepirsi, nutrirsi e raccontarsi.</p><p class='mb-4'>Il teatro, con la sua atmosfera intima e simbolica, ha amplificato la profondità del percorso: è diventato il luogo in cui ogni donna ha potuto portare la propria voce, la propria vulnerabilità e la propria forza. Il progetto si è concluso con un momento collettivo di riflessione, in cui ciascuna partecipante ha avuto modo di riconoscere non solo ciò che aveva compreso, ma ciò che aveva sentito, dentro il corpo e dentro di sé.</p><p class='mb-4'>La donna e il suo corpo è stato molto più di un incontro formativo: è stato un invito a tornare ad abitare il proprio corpo come luogo di potere, di storia, di libertà e di cura. Un'esperienza che ha mostrato, una volta ancora, che quando le donne si mettono in ascolto di sé e lo fanno insieme, qualcosa di profondo e trasformativo può accadere.</p>",
      2: "<p class='mb-4'><strong>Mindfulness tra Natura e Sapori</strong></p><p class='mb-4'>Un'esperienza immersiva tra mindful walking e mindful eating a Vetriolo Terme, con degustazione consapevole e camminata in natura.</p>",
      3: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>ZenFlow</h3><p class='mb-4'>ZenFlow è un percorso di 10 incontri online dedicato al benessere integrato di mente e corpo. In collaborazione con un'insegnante di yoga, abbiamo alternato 5 incontri di mindfulness da me condotti e 5 di yoga guidati da lei.</p><p class='mb-4'>Ogni lunedì sera i partecipanti hanno sperimentato pratiche complementari di presenza, respiro e movimento, pensate per favorire equilibrio, ascolto e rilassamento profondo. Un ciclo semplice ma trasformativo, nato per portare consapevolezza nella quotidianità.</p><p class='mb-4'><strong>Collaborazione con:</strong> Barbara Infinity Balance</p>",
      4: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Progetto sulle emozioni alla Scuola primaria: I super poteri del cuore</h3><p class='mb-4'>Nel progetto <strong>Super poteri del cuore</strong> ho guidato i bambini alla scoperta delle emozioni attraverso attività di mindfulness pensate per offrire una base chiara e concreta su ciò che sentono. Abbiamo esplorato gioia, rabbia, tristezza e paura imparando a riconoscerle nel corpo e nella mente.</p><p class='mb-4'>Attraverso respirazione, ascolto consapevole e piccoli esercizi di attenzione, i bambini hanno sviluppato strumenti per osservare le emozioni senza giudicarle e per esprimerle in modo più equilibrato. Il percorso ha favorito consapevolezza, regolazione emotiva e un clima di classe più accogliente, aiutando ogni bambino a sentirsi visto, compreso e capace di comprendere meglio se stesso.</p><p class='mb-4'><strong>Collaborazione con:</strong> Silvia Ferrari, docente di Scuola Primaria</p>",
      5: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Benessere per le atlete: percorsi di gestione dell'ansia e dello stress pre/post gara</h3><p class='mb-4'>Nel progetto dedicato al benessere delle atlete abbiamo proposto un percorso mirato alla gestione dell'ansia e dello stress nelle fasi pre e post gara. Attraverso momenti di confronto, esercizi di respirazione consapevole e pratiche di mindfulness abbiamo lavorato sulle risorse personali utili a recuperare centratura, fiducia e lucidità.</p><p class='mb-4'>L'obiettivo era offrire strumenti semplici e applicabili subito, capaci di sostenere le atlete nelle sfide sportive e nella cura del proprio equilibrio emotivo.</p>",
      6: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Emozioni in gioco: laboratorio per genitori e figli</h3><p class='mb-4'>Un laboratorio dedicato a genitori e figli per esplorare insieme il mondo delle emozioni attraverso il gioco e la Mindfulness. Un percorso esperienziale che favorisce ascolto, presenza e connessione, offrendo strumenti pratici per riconoscere e condividere ciò che si prova.</p><p class='mb-4'>Attraverso attività creative e momenti di calma consapevole, adulti e bambini imparano a comunicare in modo più autentico, a rafforzare il legame affettivo e a vivere un tempo di qualità, ricco di scoperte e piccoli gesti di cura reciproca.</p><p class='mb-4'><strong>Collaborazione con:</strong> Sofia Dalla Libera, Psicologa e Psicoterapeuta in formazione all'ultimo anno</p>",
      7: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Rituali di gusto: degustazione consapevole e mindfulness presso il caseificio Sapori di Montegnago</h3><p class='mb-4'><strong>Rituali di gusto</strong> è un percorso pensato per portare i partecipanti oltre la semplice degustazione, trasformandola in un atto di presenza. Al caseificio Sapori di Montegnago, insieme ad Elisa, casara e degustatrice ONAF, che ha guidato i partecipanti in un viaggio tra lavorazioni artigiane, profumi e stagionature.</p><p class='mb-4'>Ho poi introdotto una pratica di mindful eating dedicata alla degustazione dei loro formaggi: respirare, osservare, assaggiare con intenzione, riconoscere consistenze e sfumature, lasciando che ogni morso diventi un momento di ascolto e connessione autentica con il cibo.</p><p class='mb-4'><strong>Collaborazione con:</strong> Elisa Marini, casara e degustatrice ONAF</p>",
      8: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Spazio Ben-essere: incontri di benessere personale e relazionale</h3><p class='mb-4'>Da gennaio 2026 io e la dott.ssa Sofia Dalla Libera proporremo una serie di incontri gratuiti dedicati al benessere personale e relazionale. Uno spazio accogliente in cui fermarsi, ascoltarsi e approfondire temi legati alla cura di sé, alle dinamiche relazionali e alla consapevolezza emotiva.</p><p class='mb-4'>Ogni appuntamento, della durata di un'ora e mezza, offrirà spunti pratici, momenti di riflessione e occasioni di confronto guidato. Un percorso pensato per chi desidera ritrovare equilibrio, coltivare presenza e comprendere meglio il proprio mondo interiore.</p><p class='mb-4'><strong>Collaborazione con:</strong> Sofia Dalla Libera, Psicologa e Psicoterapeuta</p>",
      9: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>D.I.T.A. – Danza, Integrazione, Terapia e Ascolto</h3><p class='mb-4'>Il progetto <strong>D.I.T.A.</strong> nasce dall'incontro tra psicologia e movimento, con l'obiettivo di offrire un'esperienza trasformativa che integra corpo, mente ed emozioni. D.I.T.A. è l'acronimo di <strong>Danza, Integrazione, Terapia e Ascolto</strong>, quattro dimensioni che si intrecciano per creare uno spazio di esplorazione profonda.</p><p class='mb-4'><strong>Danza:</strong> il movimento come linguaggio dell'anima, per esprimere ciò che le parole non riescono a dire. Non serve saper danzare: ogni gesto autentico è benvenuto.</p><p class='mb-4'><strong>Integrazione:</strong> un approccio che unisce diverse discipline – dalla mindfulness alla psicomotricità – per lavorare sulla persona nella sua interezza.</p><p class='mb-4'><strong>Terapia:</strong> il contesto sicuro e guidato in cui il movimento diventa strumento di consapevolezza, elaborazione e cambiamento.</p><p class='mb-4'><strong>Ascolto:</strong> la capacità di sintonizzarsi con se stessi, con il proprio corpo e con gli altri, riscoprendo sensazioni, bisogni e risorse spesso dimenticate.</p><p class='mb-4'>Durante gli incontri, i partecipanti vengono guidati attraverso pratiche di movimento consapevole, esercizi di respirazione, momenti di condivisione e brevi meditazioni. L'obiettivo non è la performance, ma la presenza: abitare il proprio corpo con gentilezza, lasciando emergere ciò che ha bisogno di essere visto e accolto.</p>",
      10: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Calm Connection: Ritrovare la Calma, Riscoprire la Connessione</h3><p class='mb-4'><strong>Calm Connection</strong> è un percorso esperienziale che unisce pratiche di mindfulness e lavoro relazionale per aiutare i partecipanti a coltivare una calma interiore profonda e a costruire connessioni più autentiche con se stessi e con gli altri.</p><p class='mb-4'>In un mondo sempre più frenetico e iperconnesso, spesso perdiamo il contatto con ciò che conta davvero: la qualità delle nostre relazioni, la presenza nel momento e la capacità di ascoltarci. Calm Connection nasce proprio da questa esigenza.</p><p class='mb-4'><strong>Calma:</strong> tecniche di respirazione, meditazione guidata e body scan per ridurre lo stress, regolare il sistema nervoso e ritrovare un senso di centratura e stabilità interiore.</p><p class='mb-4'><strong>Consapevolezza:</strong> pratiche di mindfulness per osservare pensieri, emozioni e sensazioni corporee senza giudizio, sviluppando una presenza più lucida e compassionevole.</p><p class='mb-4'><strong>Connessione:</strong> esercizi relazionali e momenti di condivisione per esplorare come ci relazioniamo agli altri, riconoscere schemi automatici e sperimentare nuove modalità di comunicazione autentica.</p>"
    };

    function openLabArticle(id) {
      const art = articles.find(a => a.id === id);
      if (!art) return;
      const gallery = (art.images || []).map((src, i) => `<figure class='inline-block mr-2 mb-2'><img src='${encodeURI(src)}' alt='immagine ${i+1}' class='w-40 h-28 object-cover rounded-md'></figure>`).join('');
      articleContent.innerHTML = `
        <span class=\"text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block\">${art.tag}</span>
        <h2 class=\"text-3xl font-serif font-bold text-primary mb-6\">${art.title}</h2>
        <div class=\"text-secondary text-lg leading-relaxed space-y-4 font-light\">${fullTexts[id] || art.excerpt}</div>
        ${gallery ? `<div class='mt-6'>${gallery}</div>` : ''}
      `;
      articleEl.classList.remove('hidden');
      window.scrollTo({ top: articleEl.offsetTop - 80, behavior: 'smooth' });
    }

    function closeLabArticle() {
      articleEl.classList.add('hidden');
      articleContent.innerHTML = '';
    }

    let currentPage = 0;
    const itemsPerPage = 4;
    const totalPages = Math.ceil(articles.length / itemsPerPage);

    function renderPage() {
      container.innerHTML = '';
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const pageArticles = articles.slice(start, end);

      pageArticles.forEach(art => {
        const card = document.createElement('div');
        card.className = 'blog-card p-8 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full';
        card.innerHTML = `
          ${art.bgImage ? `<div class="w-full h-40 rounded-lg overflow-hidden mb-4 flex-shrink-0"><img src="${encodeURI(art.bgImage)}" alt="${art.title}" class="w-full h-full object-cover"></div>` : ''}
          <span class="text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block">${art.tag}</span>
          <h3 class="text-2xl font-bold text-primary mb-4 font-serif">${art.title}</h3>
          <p class="text-secondary mb-6 text-sm flex-grow">${art.excerpt}</p>
          <button class="font-bold text-primary hover:text-accent-cta transition text-left mt-auto" onclick="openLabArticle(${art.id})">Apri laboratorio &rarr;</button>
        `;
        if (art.bgImage) {
          const thumb = document.createElement('div');
          thumb.className = 'card-thumb';
          const img = document.createElement('img');
          img.src = encodeURI(art.bgImage);
          img.alt = art.title;
          thumb.appendChild(img);
          card.appendChild(thumb);
        }
        container.appendChild(card);
      });

      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
      document.getElementById('page-indicator').textContent = `${currentPage + 1} / ${totalPages}`;
    }

    function changePage(direction) {
      currentPage += direction;
      if (currentPage < 0) currentPage = 0;
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderPage();
