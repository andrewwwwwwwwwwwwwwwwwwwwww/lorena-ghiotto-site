      1: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>La donna e il suo corpo: un progetto dedicato all'empowerment femminile</h3><p class='mb-4'>Il progetto La donna e il suo corpo nasce dall'esigenza di creare uno spazio sicuro, accogliente e profondamente rispettoso in cui le donne potessero esplorare il proprio rapporto con il corpo, la propria storia emotiva e le modalità con cui, nel tempo, si sono relazionate al cibo, all'immagine di sé e al proprio benessere complessivo. L'incontro si è svolto in un teatro a Roma, un luogo scelto volutamente per la sua capacità di contenere, simbolicamente e fisicamente, ciò che emerge quando si lavora sull'identità corporea: il palco come spazio di espressione, la platea come spazio di ascolto, il teatro intero come contenitore di trasformazioni.</p><p class='mb-4'>Il progetto è stato realizzato in collaborazione con due colleghe: una psicoterapeuta e una dietista. La loro presenza ha arricchito il percorso portando sguardi complementari e competenze specifiche, fondamentali per affrontare il tema dell'empowerment femminile in modo completo e multidisciplinare. La psicoterapeuta ha lavorato sulle dimensioni emotive, sulle memorie corporee e sui vissuti legati all'immagine di sé, offrendo alle partecipanti strumenti per riconoscere le narrazioni interiori che spesso condizionano l'esperienza del corpo. La dietista, invece, ha portato un contributo prezioso legato alla fisiologia, all'alimentazione consapevole e alla possibilità di costruire un rapporto con il cibo più gentile, meno giudicante e calibrato sui bisogni reali.</p><p class='mb-4'>All'interno di questo quadro, il mio intervento si è concentrato sul mindful eating, un approccio che invita a recuperare presenza, sensorialità e connessione nel gesto quotidiano del nutrirsi. L'obiettivo non era insegnare \"come mangiare\", ma accompagnare le partecipanti nell'esplorare cosa accade nel corpo e nella mente quando ci si avvicina al cibo: quali emozioni emergono, quali automatismi prendono il sopravvento, quali sensazioni vengono ignorate o amplificate. Il mindful eating, in questo contesto, è diventato uno strumento per riscoprire la propria autenticità, entrando in relazione con se stesse senza giudizio e senza fretta.</p><p class='mb-4'>Durante il laboratorio abbiamo lavorato sull'ascolto del corpo, sull'osservazione dei segnali di fame e sazietà, sulla qualità del respiro e sul contatto con le sensazioni fisiche. Attraverso esercizi guidati, brevi meditazioni e momenti di condivisione, le partecipanti hanno potuto sperimentare come la consapevolezza possa trasformare l'esperienza del cibo e, più in generale, il modo in cui ci si abita dentro. Il cibo, infatti, è spesso uno dei linguaggi attraverso cui il corpo parla: comprenderlo, ascoltarlo e riconoscerlo significa restituire dignità alle proprie emozioni e ai propri bisogni.</p><p class='mb-4'>Il lavoro con le mie colleghe ha creato una sinergia particolarmente efficace. La Dott.ssa Iris Mattera, psicoterapeuta, ha offerto chiavi di lettura interiori grazie alla messa in scena dello Psicodramma. Veronica Giachè, dietista, ha dato indicazioni pratiche e scientifiche, e la mindful eating ha rappresentato il ponte tra queste due dimensioni, traducendo teoria e consapevolezza in esperienza. Questo approccio ha permesso alle partecipanti di sentirsi accolte nella complessità della loro storia personale, senza semplificazioni né giudizi, e di scoprire che l'empowerment femminile passa anche attraverso un nuovo modo di percepirsi, nutrirsi e raccontarsi.</p><p class='mb-4'>Il teatro, con la sua atmosfera intima e simbolica, ha amplificato la profondità del percorso: è diventato il luogo in cui ogni donna ha potuto portare la propria voce, la propria vulnerabilità e la propria forza. Il progetto si è concluso con un momento collettivo di riflessione, in cui ciascuna partecipante ha avuto modo di riconoscere non solo ciò che aveva compreso, ma ciò che aveva sentito, dentro il corpo e dentro di sé.</p><p class='mb-4'>La donna e il suo corpo è stato molto più di un incontro formativo: è stato un invito a tornare ad abitare il proprio corpo come luogo di potere, di storia, di libertà e di cura. Un'esperienza che ha mostrato, una volta ancora, che quando le donne si mettono in ascolto di sé e lo fanno insieme, qualcosa di profondo e trasformativo può accadere.</p>",
      2: "<p class='mb-4'><strong>Mindfulness tra Natura e Sapori</strong></p><p class='mb-4'>Un'esperienza immersiva tra mindful walking e mindful eating a Vetriolo Terme, con degustazione consapevole e camminata in natura.</p>",
      3: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>ZenFlow</h3><p class='mb-4'>ZenFlow è un percorso di 10 incontri online dedicato al benessere integrato di mente e corpo. In collaborazione con un'insegnante di yoga, abbiamo alternato 5 incontri di mindfulness da me condotti e 5 di yoga guidati da lei.</p><p class='mb-4'>Ogni lunedì sera i partecipanti hanno sperimentato pratiche complementari di presenza, respiro e movimento, pensate per favorire equilibrio, ascolto e rilassamento profondo. Un ciclo semplice ma trasformativo, nato per portare consapevolezza nella quotidianità.</p><p class='mb-4'><strong>Collaborazione con:</strong> Barbara Infinity Balance</p>",
      4: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Progetto sulle emozioni alla scuola primaria: \"I Super Poteri del Cuore\"</h3><p class='mb-4'>Educare alle emozioni significa offrire ai bambini gli strumenti per conoscersi davvero, per comprendere ciò che accade dentro di loro e per affrontare il mondo con maggiore equilibrio. Da diversi anni porto nelle scuole primarie il mio laboratorio \"I Super Poteri del Cuore\", un percorso che unisce educazione emotiva e pratiche di mindfulness, pensato per aiutare i bambini a sviluppare consapevolezza, presenza e gentilezza verso se stessi e gli altri.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Un percorso che parte dal cuore</h4><p class='mb-4'>Il progetto è costruito come un viaggio: un viaggio alla scoperta di quattro emozioni fondamentali — gioia, rabbia, tristezza e paura — presentate ai bambini come veri e propri \"super poteri\". Ogni emozione è un'energia che abita dentro di noi e che, se impariamo ad ascoltarla, può diventare un alleato prezioso.</p><p class='mb-4'>In questo laboratorio spiego ai bambini che non esistono emozioni \"giuste\" o \"sbagliate\": tutte sono utili, tutte portano un messaggio. La rabbia ci aiuta a difendere i confini, la paura ci protegge, la tristezza ci invita a rallentare e chiedere aiuto, la gioia ci apre alla condivisione. Scoprirlo insieme a loro, attraverso attività esperienziali, trasforma la classe in un luogo di ascolto e di relazione autentica.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Il diario delle emozioni: uno spazio personale e sicuro</h4><p class='mb-4'>Uno degli strumenti più significativi del progetto è il diario delle emozioni, un quaderno che accompagna i bambini lungo tutto il percorso. È il loro spazio privato e creativo, dove possono:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>annotare sensazioni e pensieri</li><li>disegnare ciò che provano</li><li>registrare gli esercizi di mindfulness fatti insieme</li><li>osservare come le emozioni cambiano nel tempo</li></ul><p class='mb-4'>Scrivere e disegnare aiuta i bambini a dare forma a ciò che a volte non sanno ancora esprimere a parole. Il diario diventa così una piccola mappa del loro mondo interiore, un luogo sicuro dove imparare a riconoscersi.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>La mindfulness come filo conduttore</h4><p class='mb-4'>La mindfulness è il cuore pulsante del progetto. Ogni incontro include momenti di pratica guidata che permettono ai bambini di sperimentare la presenza e l'ascolto profondo:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>Respirazioni lente e consapevoli per calmare il corpo e prepararsi all'attività.</li><li>Body scan semplificati, per percepire dove l'emozione si \"accende\" nel corpo.</li><li>Esercizi di ascolto sensoriale per allenare l'attenzione.</li><li>Meditazioni brevi legate all'emozione del giorno, sempre spiegate con metafore e immagini vicine al mondo dei bambini.</li><li>Pratiche di gentilezza, rivolte a sé stessi e ai compagni.</li></ul><p class='mb-4'>Tutto ciò che viviamo insieme viene poi riportato nel diario: l'esperienza si fissa, prende forma, diventa memoria consapevole.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Imparare a riconoscere e regolare ciò che si sente</h4><p class='mb-4'>In ogni incontro invito i bambini ad ascoltare cosa succede nel corpo quando un'emozione arriva: domande semplici, ma profonde, che permettono ai bambini di collegare mente e corpo, emozione e sensazione.</p><p class='mb-4'>Grazie alle pratiche di mindfulness, imparano a:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>osservare l'emozione senza esserne travolti</li><li>dare un nome a ciò che provano</li><li>parlare di sé con più chiarezza</li><li>trovare strategie calmanti quando sono agitati o frustrati</li><li>riconoscere le emozioni negli altri e rispondere con empatia</li></ul><p class='mb-4'>Queste competenze diventano parte del lavoro quotidiano in classe e favoriscono relazioni più rispettose e un clima più sereno.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Una trasformazione che coinvolge tutta la classe</h4><p class='mb-4'>Il laboratorio non è solo un insieme di attività: è un'esperienza che cambia il modo in cui i bambini stanno insieme. Quando iniziano a riconoscere ciò che provano, crescono la disponibilità all'ascolto, la capacità di aspettare, la pazienza reciproca. Anche le insegnanti spesso testimoniano un miglioramento nella comunicazione, nella gestione dei conflitti e nella cooperazione. I bambini scoprono che non sono soli nelle loro emozioni e che ciò che provano è condiviso, umano, naturale. Questo li fa sentire visti, compresi, più sicuri.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Conclusione</h4><p class='mb-4'>\"I Super Poteri del Cuore\" è un percorso che nasce dal desiderio di aiutare i bambini a conoscere sé stessi attraverso strumenti semplici, concreti e profondi. La mindfulness offre loro una bussola interiore, il diario dà una voce alle emozioni e l'intero viaggio diventa un'esperienza che resta, che forma e che cresce con loro.</p><p class='mb-4'><strong>Collaborazione con:</strong> Silvia Ferrari, docente di Scuola Primaria</p>",
      5: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Benessere per le atlete: percorsi di gestione dell'ansia e dello stress</h3><p class='mb-4'>Nel mondo sportivo, soprattutto in età evolutiva, le emozioni legate alla competizione possono essere intense e difficili da gestire. L'ansia, la tensione, la paura di sbagliare o la pressione del risultato possono influenzare non solo la performance, ma anche il benessere psicologico delle giovani atlete.</p><p class='mb-4'>Per questo, come psicoterapeuta e formatrice in mindfulness, negli ultimi anni ho sviluppato e condotto un progetto specifico dedicato al benessere delle atlete, con percorsi mirati alla gestione dell'ansia e dello stress nelle fasi pre e post gara. Il progetto ha coinvolto bambine dagli 8 ai 10 anni e atlete preadolescenti e adolescenti delle scuole medie e superiori, con interventi calibrati in base all'età, alla maturità emotiva e alle esigenze sportive.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Perché lavorare sulle emozioni nello sport?</h4><p class='mb-4'>La gara è un momento carico di aspettative, emozioni e adrenalina. Molte atlete, anche piccole, sperimentano:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>agitazione prima della competizione</li><li>pensieri negativi o autosvalutanti</li><li>difficoltà di concentrazione</li><li>tensioni muscolari</li><li>paura di deludere allenatori, compagni o famiglia</li><li>fatica nel \"staccare\" dopo la gara</li></ul><p class='mb-4'>Intervenire su questi aspetti significa educare alla consapevolezza emotiva, aiutando ogni atleta a riconoscere ciò che accade nel corpo e nella mente, e a sviluppare strumenti efficaci per ritrovare equilibrio e lucidità.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Mindfulness e sport: un binomio efficace</h4><p class='mb-4'>Il cuore del percorso è stato l'utilizzo della mindfulness applicata allo sport, adattata alle diverse fasce d'età.</p><p class='mb-4'><strong>Con le piccole atlete (8–10 anni)</strong></p><p class='mb-4'>Ho lavorato attraverso attività semplici, giocose ma profonde:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>respirazioni lente per calmarsi</li><li>riconoscimento delle sensazioni corporee pre-gara</li><li>piccole visualizzazioni guidate per immaginarsi calme e presenti</li><li>esercizi per \"sentire il cuore che corre\" e imparare a rallentarlo</li><li>pratiche di concentrazione attraverso suoni, oggetti o movimenti lenti</li></ul><p class='mb-4'>Le bambine hanno imparato a individuare i segnali dell'ansia (\"la pancia che stringe\", \"la gola che si chiude\", \"le mani che tremano\") e a usare strumenti immediati per ritrovare controllo e fiducia.</p><p class='mb-4'><strong>Con le atlete più grandi (medie e superiori)</strong></p><p class='mb-4'>Il lavoro è stato più approfondito e ha toccato temi centrali per la performance sportiva:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>riconoscere i pensieri che alimentano l'ansia (\"non ce la farò\", \"e se sbaglio?\")</li><li>pratiche di respiro per modulare l'attivazione fisiologica</li><li>esercizi di grounding per ritrovare presenza nel corpo</li><li>strategie per migliorare la concentrazione e la gestione del focus</li><li>comprensione del dialogo interno e del suo impatto sulla prestazione</li><li>pratiche di mindfulness per affrontare la gara con calma e determinazione</li></ul><p class='mb-4'>Le atlete hanno così imparato a distinguere tra stress \"utile\" e stress \"bloccante\", e a intervenire sui momenti critici prima e dopo la competizione.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Il pre-gara: dalla tensione alla centratura</h4><p class='mb-4'>Uno degli aspetti più delicati è la fase immediatamente precedente alla gara, dove spesso emergono:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>paura di sbagliare</li><li>agitazione fisica</li><li>confusione mentale</li><li>iperattenzione agli altri</li></ul><p class='mb-4'>Abbiamo lavorato per trasformare questo momento da fonte di stress a spazio di preparazione consapevole, attraverso:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>rituali brevi di calm breathing</li><li>sequenze di presenza corporea</li><li>visualizzazioni positive e realistiche</li><li>ancoraggi con frasi interne brevi, semplici e potenzianti</li></ul><p class='mb-4'>Ciò ha aiutato le atlete a entrare in gara con una mente più stabile e un corpo più disponibile alla performance.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Il post-gara: recuperare equilibrio</h4><p class='mb-4'>Dopo la competizione emergono spesso:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>delusione</li><li>sovraeccitazione</li><li>fatica mentale</li><li>difficoltà nel \"spegnere\" la tensione</li></ul><p class='mb-4'>Abbiamo introdotto pratiche di defaticamento emotivo e mentale:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>respirazioni distensive</li><li>ascolto del corpo per scaricare tensioni residue</li><li>spazi di condivisione guidata sulle emozioni</li><li>esercizi per riformulare l'esperienza in modo costruttivo</li></ul><p class='mb-4'>Questo ha permesso di trasformare la gara in un'occasione di crescita, non di giudizio.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Strumenti semplici, effetti profondi</h4><p class='mb-4'>Le atlete hanno sperimentato un miglioramento nella:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>gestione dell'ansia</li><li>concentrazione</li><li>fiducia in sé</li><li>capacità di recupero</li><li>consapevolezza dei propri limiti e delle proprie risorse</li><li>stabilità emotiva nelle situazioni di pressione</li></ul><p class='mb-4'>Hanno inoltre imparato a riconoscersi, ascoltarsi e valorizzarsi.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Conclusione: lo sport come palestra di consapevolezza</h4><p class='mb-4'>Il percorso ha dimostrato quanto lo sport possa diventare una straordinaria palestra non solo per il corpo, ma anche per la mente e il cuore. Lavorare con atlete così giovani — dai primi anni della primaria fino agli adolescenti — significa offrire loro strumenti che le accompagneranno per tutta la vita: non solo in gara, ma nella gestione dello stress quotidiano, nella scuola, nelle relazioni. La mindfulness, con la sua semplicità e profondità, diventa così un alleato prezioso per affrontare la competizione con presenza, equilibrio e un rinnovato senso di fiducia.</p>",
      6: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>\"Emozioni in gioco\": un laboratorio per genitori e figli alla scoperta del mondo emotivo</h3><p class='mb-4'>Nel ritmo frenetico della quotidianità, trovare un tempo di qualità da condividere con i propri figli può diventare una sfida. Spesso le emozioni, soprattutto quelle più difficili, rimangono inascoltate, accantonate o espresse in modi che generano distanza e incomprensioni.</p><p class='mb-4'>Per questo, insieme a una collega psicologa, abbiamo ideato \"Emozioni in gioco\", un laboratorio esperienziale rivolto a genitori e bambini che desiderano esplorare insieme il mondo delle emozioni attraverso il gioco, la creatività e la mindfulness. Un percorso fatto di più incontri, pensato per favorire ascolto reciproco, presenza e connessione, e per offrire a grandi e piccoli strumenti concreti per riconoscere, esprimere e condividere ciò che provano.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Perché un laboratorio per genitori e figli?</h4><p class='mb-4'>Le emozioni sono il linguaggio più autentico attraverso cui comunichiamo. Tuttavia, non sempre abbiamo gli strumenti per comprenderle o per sostenere quelle dei nostri figli.</p><p class='mb-4'>Questo laboratorio nasce dall'esigenza di creare uno spazio protetto, dove adulti e bambini possano:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>imparare a conoscersi meglio</li><li>comprendere il proprio funzionamento emotivo</li><li>trasformare i momenti di fatica in occasioni di dialogo</li><li>riscoprire il piacere di stare insieme senza fretta</li><li>sviluppare una comunicazione affettiva più chiara e gentile</li></ul><p class='mb-4'>La presenza congiunta di genitori e figli permette un apprendimento condiviso, profondamente relazionale, dove ogni esperienza diventa un'opportunità per costruire complicità, fiducia e vicinanza emotiva.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Mindfulness: il cuore silenzioso del percorso</h4><p class='mb-4'>La mindfulness è il filo conduttore di tutti gli incontri. Proposta in modo semplice e accessibile, diventa uno strumento che aiuta grandi e piccoli a:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>portare attenzione al momento presente</li><li>ascoltare il corpo e le sensazioni interne</li><li>calmare mente e respiro nei momenti di agitazione</li><li>restare con ciò che si prova senza giudicarsi</li><li>comunicare con maggiore consapevolezza</li></ul><p class='mb-4'>Attraverso pratiche brevi, guidate e accompagnate da metafore e immagini vicine all'esperienza dei bambini, la mindfulness sostiene un clima di calma e apertura, favorendo l'ascolto reciproco.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Il gioco come ponte tra emozioni e relazione</h4><p class='mb-4'>Il gioco è il linguaggio naturale dei bambini e, quando condiviso con i genitori, diventa una modalità profonda per comunicare senza pressioni né aspettative.</p><p class='mb-4'>Durante il laboratorio proponiamo attività creative e ludiche che permettono di:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>riconoscere nel corpo le diverse emozioni</li><li>sperimentare modalità nuove di espressione emotiva</li><li>osservare come l'altro vive e comunica ciò che sente</li><li>ridere, muoversi, creare insieme</li><li>costruire ricordi comuni significativi</li></ul><p class='mb-4'>Ogni attività è pensata per facilitare il dialogo, valorizzare il legame e spronare genitori e figli a guardarsi con occhi nuovi.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Cosa si sperimenta durante gli incontri</h4><p class='mb-4'>Il percorso è strutturato in più sessioni, ognuna con un tema specifico. Gli incontri includono:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>giochi di movimento e cooperazione</li><li>attività creative (disegno, collage, piccoli laboratori manuali)</li><li>pratiche di mindfulness condivise</li><li>esercizi di ascolto e comunicazione emotiva</li><li>momenti di confronto guidato tra genitori e bambini</li><li>spazi di calma e silenzio per ritrovare presenza</li></ul><p class='mb-4'>Ogni coppia genitore-figlio porta via con sé un piccolo bagaglio di strumenti pratici, da utilizzare nella quotidianità per affrontare i momenti di tensione, per sostenere le emozioni difficili e per vivere relazioni più morbide e consapevoli.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Un tempo di qualità che lascia il segno</h4><p class='mb-4'>Ciò che spesso emerge alla fine del percorso è un senso profondo di gratitudine: per aver dedicato tempo, per aver ascoltato davvero, per aver condiviso momenti autentici e teneri. Genitori e figli imparano a comunicare con maggiore sincerità e delicatezza; i bambini si sentono più compresi e accolti, mentre gli adulti scoprono nuove modalità per sostenere e accompagnare i propri figli nelle sfide emotive di ogni giorno.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Conclusione: crescere insieme attraverso le emozioni</h4><p class='mb-4'>\"Emozioni in gioco\" non è solo un laboratorio: è un'esperienza che mette al centro la relazione, dando valore alla presenza, alla lentezza e alla cura.</p><p class='mb-4'>Attraverso il gioco, la creatività e la mindfulness, genitori e bambini imparano a conoscersi meglio e a costruire un legame più profondo, fatto di ascolto, autenticità e piccoli gesti di attenzione quotidiana. Un percorso che ricorda a tutti, grandi e piccoli, che le emozioni non sono ostacoli, ma ponti: ponti che permettono di incontrarsi, capirsi e crescere insieme.</p><p class='mb-4'><strong>Collaborazione con:</strong> Sofia Dalla Libera, Psicologa e Psicoterapeuta in formazione all'ultimo anno</p>",
      7: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>\"Rituali di gusto\": degustazione consapevole e mindfulness al caseificio Sapori di Montegnago</h3><p class='mb-4'>In un mondo che corre veloce, anche il cibo rischia di diventare un gesto automatico, quasi invisibile. Mangiamo senza accorgercene, senza davvero assaporare, senza ascoltare ciò che il corpo e i sensi ci stanno raccontando.</p><p class='mb-4'>È da questa riflessione che, insieme alla mia amica Elisa, casara, degustatrice ONAF, è nato \"Rituali di gusto\", un laboratorio che unisce la tradizione casearia artigianale alla mindfulness e alla degustazione consapevole. Un'esperienza immersiva che invita a rallentare, ad aprire i sensi e a incontrare il cibo in modo più autentico, in un luogo speciale: un caseificio nel verde dei Colli Berici, dove il tempo sembra avere un ritmo diverso.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Un viaggio nel mondo del formaggio, guidati da chi lo crea</h4><p class='mb-4'>La prima parte del laboratorio è stata affidata a Elisa, casara esperta e appassionata.</p><p class='mb-4'>Attraverso il suo racconto, i partecipanti hanno potuto:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>scoprire le fasi della lavorazione artigianale del latte</li><li>comprendere il valore delle stagionature</li><li>riconoscere profumi, aromi e caratteristiche dei diversi formaggi</li><li>immergersi in un mondo fatto di gesti antichi, attenzione e cura</li></ul><p class='mb-4'>La sua guida ha trasformato la degustazione in un viaggio sensoriale: ogni formaggio portava con sé una storia, un tempo, una consistenza, una stagione.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Mindful eating: quando la degustazione diventa presenza</h4><p class='mb-4'>Dopo aver esplorato l'arte casearia, ho accompagnato i partecipanti in una pratica di mindful eating, pensata appositamente per la degustazione dei formaggi di Sapori di Montegnago. Abbiamo lavorato per portare l'attenzione a ogni fase dell'esperienza:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>respirare, per preparare i sensi</li><li>osservare forme e colori senza giudizio</li><li>ascoltare consistenze e sensazioni al tatto</li><li>annusare aromi evidenti e note più sottili</li><li>assaggiare con intenzione, lasciando che il gusto si sviluppasse lentamente</li><li>riconoscere le sfumature del sapore e la risposta del corpo</li></ul><p class='mb-4'>In questo modo, ogni morso diventava un rito, un atto di cura e di ascolto, un invito a riscoprire la relazione profonda che abbiamo con il cibo.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Un'atmosfera che nutre corpo, mente e relazione</h4><p class='mb-4'>Il laboratorio si è svolto in un contesto naturale che ha accompagnato la pratica: il silenzio dei colli, l'aria fresca, il ritmo lento del luogo hanno creato un ambiente ideale per un incontro più attento con il cibo e con sé stessi.</p><p class='mb-4'>I partecipanti hanno potuto sperimentare:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>un nuovo modo di avvicinarsi al gusto</li><li>un contatto più profondo con i propri sensi</li><li>un rallentamento autentico</li><li>una degustazione che non è solo piacere, ma anche consapevolezza</li><li>un momento di condivisione semplice e genuino</li></ul><p class='mb-4'>\"Rituali di gusto\" non è stato soltanto un evento, ma un'esperienza di educazione sensoriale e mindfulness che ha lasciato in molti la voglia di ripetere, di continuare a nutrirsi con più attenzione e presenza.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Perché nasce questo laboratorio</h4><p class='mb-4'>Ho voluto creare questo percorso perché credo che il cibo possa essere una porta di accesso alla consapevolezza quotidiana.</p><p class='mb-4'>Mangiare con presenza significa:</p><ul class='list-disc pl-6 mb-4 space-y-1'><li>rispettare il lavoro artigiano</li><li>ascoltare il corpo</li><li>riconnettersi ai sensi</li><li>trasformare un gesto quotidiano in un momento di cura</li></ul><p class='mb-4'>E farlo insieme a Elisa, nel suo caseificio immerso nel verde, ha reso tutto ancora più autentico.</p><h4 class='text-xl font-serif font-bold text-primary mb-4 mt-6'>Conclusione: un rituale che resta</h4><p class='mb-4'>\"Rituali di gusto\" è un invito a vivere il cibo in modo diverso: più lento, più sentito, più vero. Una degustazione che diventa esperienza, una pausa che diventa ascolto, un formaggio che diventa storia, dialogo, presenza. Un rituale che rimane, anche una volta tornati a casa: la capacità di assaporare, di rallentare, di riconoscere ciò che nutre davvero.</p><p class='mb-4'><strong>Collaborazione con:</strong> Elisa Marini, casara e degustatrice ONAF</p>",
      8: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Spazio Ben-essere: incontri di benessere personale e relazionale</h3><p class='mb-4'>Da gennaio 2026 io e la dott.ssa Sofia Dalla Libera proporremo una serie di incontri gratuiti dedicati al benessere personale e relazionale. Uno spazio accogliente in cui fermarsi, ascoltarsi e approfondire temi legati alla cura di sé, alle dinamiche relazionali e alla consapevolezza emotiva.</p><p class='mb-4'>Ogni appuntamento, della durata di un'ora e mezza, offrirà spunti pratici, momenti di riflessione e occasioni di confronto guidato. Un percorso pensato per chi desidera ritrovare equilibrio, coltivare presenza e comprendere meglio il proprio mondo interiore.</p><p class='mb-4'><strong>Collaborazione con:</strong> Sofia Dalla Libera, Psicologa e Psicoterapeuta</p>",
      9: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Progetto D.I.T.A.</h3><p class='mb-4'>Il progetto D.I.T.A., realizzato presso l'IC Statale Michelangelo Buonarroti di Rubano e finanziato dall'Unione Europea per la Regione Veneto, è stato pensato per promuovere affettività, emotività e benessere negli studenti della scuola secondaria di primo grado.</p><p class='mb-4'>Ho partecipato al progetto conducendo una sessione di mindfulness rivolta a tutte le classi di terza media. L'incontro è iniziato con una spiegazione semplice e accessibile di cosa sia la mindfulness e di come possa aiutare a riconoscere emozioni, pensieri e stati interiori. Successivamente, gli studenti sono stati guidati in brevi meditazioni pensate per favorire calma, centratura e ascolto di sé.</p><p class='mb-4'>Nonostante la durata contenuta, l'esperienza è stata intensa e significativa: tutti gli studenti coinvolti hanno potuto sperimentare un momento di benessere, quiete e presenza, portando con sé strumenti utili da applicare nella quotidianità scolastica e personale.</p>",
      10: "<h3 class='text-2xl font-serif font-bold text-primary mb-6'>Calm Connection (evento 17 gennaio 2026)</h3><p class='mb-4'>Calm Connection è stato un invito a rallentare, ascoltarsi e creare connessioni autentiche, immersi nella natura di Vetriolo Terme, nello splendido spazio del NIF Alpine Taste.</p><p class='mb-4'>La giornata si è aperta con una pratica di yoga guidata da Barbara, insegnante di yoga, che ci ha accompagnate in un risveglio dolce del corpo e del respiro, creando uno spazio di presenza e apertura.</p><p class='mb-4'>Dopo la pratica, siamo state coccolate da uno squisito brunch, preparato con cura da Edo, proprietario del NIF, un momento conviviale che ha favorito condivisione e leggerezza.</p><p class='mb-4'>A seguire, Michela ha condotto un primo laboratorio di ceramica, lavorando l'argilla come strumento di espressione, creatività e ascolto. Un'esperienza tattile e meditativa, dove il tempo ha iniziato naturalmente a rallentare.</p><p class='mb-4'>Nel pomeriggio ho guidato una sessione di mindful walking; attraverso una breve passeggiata nel bosco, ci siamo concesse il tempo di rallentare il passo e affinare l'ascolto: dei piedi che toccano la terra, del respiro che si fa più profondo, dei suoni del bosco che diventano presenza viva. La pratica si è conclusa con una meditazione nel bosco, uno spazio di quiete e raccoglimento in cui fermarsi, osservare e semplicemente essere. Avvolte dall'energia del luogo, abbiamo coltivato una presenza gentile e radicata, portando con noi una sensazione di calma profonda e connessione con noi stesse e con l'ambiente circostante.</p><p class='mb-4'>Dopo una merenda deliziosa, sempre offerta dal NIF, siamo tornate nuovamente all'argilla con Michela, approfondendo il laboratorio in un clima ancora più intimo e consapevole vedendo prendere vita forma e colore, le creazioni delle partecipanti.</p><p class='mb-4'>Calm Connection è stato più di un evento: un'esperienza di benessere condiviso, fatta di cura, presenza, creatività e accoglienza, in un luogo capace di far sentire davvero a casa.</p>"
    };

    function openLabArticle(id) {
      const art = articles.find(a => a.id === id);
      if (!art) return;
      const gallery = (art.images || []).map((src, i) => `<figure class='inline-block mr-2 mb-2'><img src='${encodeURI(src)}' alt='immagine ${i+1}' class='w-40 h-28 object-cover rounded-md'></figure>`).join('');
      articleContent.innerHTML = `
        <span class=\"text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block\">${art.tag}</span>
        <h2 class=\"text-3xl font-serif font-bold text-primary mb-6\">${art.title}</h2>
        <div class=\"text-secondary text-lg leading-relaxed space-y-4 font-light\">${fullTexts[id] || art.excerpt}</div>
        ${gallery ? `<div class='mt-6'>${gallery}</div>` : ''}
      `;
      articleEl.classList.remove('hidden');
      window.scrollTo({ top: articleEl.offsetTop - 80, behavior: 'smooth' });
    }

    function closeLabArticle() {
      articleEl.classList.add('hidden');
      articleContent.innerHTML = '';
    }

    let currentPage = 0;
    const itemsPerPage = 4;
    const totalPages = Math.ceil(articles.length / itemsPerPage);

    function renderPage() {
      container.innerHTML = '';
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const pageArticles = articles.slice(start, end);

      pageArticles.forEach(art => {
        const card = document.createElement('div');
        card.className = 'blog-card p-8 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full';
        card.innerHTML = `
          ${art.bgImage ? `<div class="w-full h-40 rounded-lg overflow-hidden mb-4 flex-shrink-0"><img src="${encodeURI(art.bgImage)}" alt="${art.title}" class="w-full h-full object-cover"></div>` : ''}
          <span class="text-xs font-bold ${art.colorClass} uppercase tracking-widest mb-2 block">${art.tag}</span>
          <h3 class="text-2xl font-bold text-primary mb-4 font-serif">${art.title}</h3>
          <p class="text-secondary mb-6 text-sm flex-grow">${art.excerpt}</p>
          <button class="font-bold text-primary hover:text-accent-cta transition text-left mt-auto" onclick="openLabArticle(${art.id})">Apri laboratorio &rarr;</button>
        `;
        if (art.bgImage) {
          const thumb = document.createElement('div');
          thumb.className = 'card-thumb';
          const img = document.createElement('img');
          img.src = encodeURI(art.bgImage);
          img.alt = art.title;
          thumb.appendChild(img);
          card.appendChild(thumb);
        }
        container.appendChild(card);
      });

      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
      document.getElementById('page-indicator').textContent = `${currentPage + 1} / ${totalPages}`;
    }

    function changePage(direction) {
      currentPage += direction;
      if (currentPage < 0) currentPage = 0;
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
