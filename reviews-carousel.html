<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recensioni - Dott.ssa Lorena Ghiotto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reviews-section {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
        }

        .reviews-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .reviews-header h2 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .reviews-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #7f8c8d;
            font-size: 1rem;
            flex-wrap: wrap;
        }

        .rating-summary {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stars-display {
            color: #f39c12;
            font-size: 1.3rem;
        }

        /* Carousel Container */
        .carousel-container {
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .review-card {
            min-width: 100%;
            padding: 30px;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .review-card.active {
            opacity: 1;
            transform: scale(1);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .review-author {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .author-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .verified-badge::before {
            content: "✓";
            font-size: 1rem;
            font-weight: bold;
        }

        .review-date {
            color: #95a5a6;
            font-size: 0.9rem;
        }

        .review-rating {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stars {
            color: #f39c12;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .review-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .review-text {
            color: #555;
            line-height: 1.8;
            font-size: 1rem;
            text-align: justify;
        }

        .review-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .category-tag {
            background: #ecf0f1;
            color: #7f8c8d;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Navigation Controls */
        .carousel-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .carousel-arrow {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .carousel-arrow:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .carousel-arrow:active {
            transform: scale(0.95);
        }

        .carousel-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* Dots Navigation */
        .carousel-dots {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #bdc3c7;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            padding: 0;
        }

        .dot.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 30px;
            border-radius: 5px;
        }

        .dot:hover {
            background: #95a5a6;
        }

        .dot.active:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Footer Link */
        .reviews-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #ecf0f1;
        }

        .miodottore-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .miodottore-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .miodottore-link::after {
            content: "→";
            font-size: 1.2rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .reviews-section {
                padding: 30px 20px;
                border-radius: 15px;
            }

            .reviews-header h2 {
                font-size: 1.5rem;
            }

            .review-card {
                padding: 20px 10px;
            }

            .review-header {
                flex-direction: column;
            }

            .carousel-arrow {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }

            .carousel-controls {
                gap: 10px;
            }

            .carousel-dots {
                gap: 8px;
            }

            .miodottore-link {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .reviews-section {
                padding: 20px 15px;
            }

            .reviews-header h2 {
                font-size: 1.3rem;
            }

            .review-title {
                font-size: 1rem;
            }

            .review-text {
                font-size: 0.95rem;
            }

            .carousel-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reviews-section {
            animation: fadeIn 0.6s ease;
        }
    </style>
</head>
<body>
    <div class="reviews-section">
        <div class="reviews-header">
            <h2>Recensioni dei pazienti</h2>
            <div class="reviews-stats">
                <div class="rating-summary">
                    <span class="stars-display">★★★★★</span>
                    <strong id="averageRating">5.0</strong>
                </div>
                <span>•</span>
                <span><strong id="totalReviews">27</strong> recensioni verificate</span>
            </div>
        </div>

        <div class="carousel-container" id="carouselContainer">
            <div class="loading">Caricamento recensioni...</div>
        </div>

        <div class="carousel-controls" id="carouselControls" style="display: none;">
            <button class="carousel-arrow" id="prevBtn" aria-label="Recensione precedente">←</button>
            <div class="carousel-dots" id="carouselDots"></div>
            <button class="carousel-arrow" id="nextBtn" aria-label="Recensione successiva">→</button>
        </div>

        <div class="reviews-footer">
            <a href="https://www.miodottore.it/lorena-ghiotto/psicologo-psicoterapeuta/montemerlo" 
               class="miodottore-link" 
               target="_blank" 
               rel="noopener noreferrer">
                Leggi tutte le 27 recensioni su MioDottore
            </a>
        </div>
    </div>

    <script>
        class ReviewsCarousel {
            constructor() {
                this.currentIndex = 0;
                this.reviews = [];
                this.autoPlayInterval = null;
                this.autoPlayDelay = 5000; // 5 seconds
                this.isPaused = false;
                
                this.init();
            }

            async init() {
                await this.loadReviews();
                this.setupCarousel();
                this.setupEventListeners();
                this.startAutoPlay();
            }

            async loadReviews() {
                try {
                    const response = await fetch('reviews_complete.json');
                    const data = await response.json();
                    this.reviews = data.reviews;
                    
                    // Update stats
                    document.getElementById('averageRating').textContent = data.statistics.average_rating.toFixed(1);
                    document.getElementById('totalReviews').textContent = data.statistics.total_reviews;
                } catch (error) {
                    console.error('Error loading reviews:', error);
                    document.getElementById('carouselContainer').innerHTML = 
                        '<div class="loading">Errore nel caricamento delle recensioni.</div>';
                }
            }

            setupCarousel() {
                const container = document.getElementById('carouselContainer');
                const controls = document.getElementById('carouselControls');
                const dotsContainer = document.getElementById('carouselDots');

                // Create carousel track
                const track = document.createElement('div');
                track.className = 'carousel-track';
                track.id = 'carouselTrack';

                // Create review cards
                this.reviews.forEach((review, index) => {
                    const card = this.createReviewCard(review, index);
                    track.appendChild(card);
                });

                container.innerHTML = '';
                container.appendChild(track);
                controls.style.display = 'flex';

                // Create dots
                this.reviews.forEach((_, index) => {
                    const dot = document.createElement('button');
                    dot.className = 'dot';
                    dot.setAttribute('aria-label', `Vai alla recensione ${index + 1}`);
                    dot.addEventListener('click', () => this.goToSlide(index));
                    dotsContainer.appendChild(dot);
                });

                // Show first review
                this.showReview(0);
            }

            createReviewCard(review, index) {
                const card = document.createElement('div');
                card.className = 'review-card';
                card.setAttribute('data-index', index);

                const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                const date = new Date(review.date).toLocaleDateString('it-IT', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                const categories = review.categories
                    .map(cat => `<span class="category-tag">${cat}</span>`)
                    .join('');

                card.innerHTML = `
                    <div class="review-header">
                        <div class="review-author">
                            <div class="author-name">
                                ${review.author}
                                ${review.verified ? '<span class="verified-badge">Verificato</span>' : ''}
                            </div>
                            <div class="review-date">${date}</div>
                        </div>
                        <div class="review-rating">
                            <span class="stars">${stars}</span>
                        </div>
                    </div>
                    <div class="review-title">${review.title}</div>
                    <div class="review-text">${review.text}</div>
                    <div class="review-categories">${categories}</div>
                `;

                return card;
            }

            showReview(index) {
                const cards = document.querySelectorAll('.review-card');
                const dots = document.querySelectorAll('.dot');

                // Remove active class from all
                cards.forEach(card => card.classList.remove('active'));
                dots.forEach(dot => dot.classList.remove('active'));

                // Add active class to current
                if (cards[index]) {
                    cards[index].classList.add('active');
                }
                if (dots[index]) {
                    dots[index].classList.add('active');
                }

                this.currentIndex = index;
            }

            goToSlide(index) {
                this.showReview(index);
                this.resetAutoPlay();
            }

            nextReview() {
                const nextIndex = (this.currentIndex + 1) % this.reviews.length;
                this.goToSlide(nextIndex);
            }

            prevReview() {
                const prevIndex = (this.currentIndex - 1 + this.reviews.length) % this.reviews.length;
                this.goToSlide(prevIndex);
            }

            setupEventListeners() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const container = document.getElementById('carouselContainer');

                prevBtn.addEventListener('click', () => this.prevReview());
                nextBtn.addEventListener('click', () => this.nextReview());

                // Pause on hover
                container.addEventListener('mouseenter', () => this.pauseAutoPlay());
                container.addEventListener('mouseleave', () => this.resumeAutoPlay());

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.prevReview();
                    if (e.key === 'ArrowRight') this.nextReview();
                });

                // Touch swipe support
                let touchStartX = 0;
                let touchEndX = 0;

                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                });

                container.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    this.handleSwipe();
                });

                const handleSwipe = () => {
                    const swipeThreshold = 50;
                    const diff = touchStartX - touchEndX;

                    if (Math.abs(diff) > swipeThreshold) {
                        if (diff > 0) {
                            this.nextReview();
                        } else {
                            this.prevReview();
                        }
                    }
                };

                this.handleSwipe = handleSwipe;
            }

            startAutoPlay() {
                this.autoPlayInterval = setInterval(() => {
                    if (!this.isPaused) {
                        this.nextReview();
                    }
                }, this.autoPlayDelay);
            }

            pauseAutoPlay() {
                this.isPaused = true;
            }

            resumeAutoPlay() {
                this.isPaused = false;
            }

            resetAutoPlay() {
                clearInterval(this.autoPlayInterval);
                this.startAutoPlay();
            }

            stopAutoPlay() {
                clearInterval(this.autoPlayInterval);
            }
        }

        // Initialize carousel when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new ReviewsCarousel();
            });
        } else {
            new ReviewsCarousel();
        }
    </script>
</body>
</html>
